<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>

  <!-- Core switch -->
  <rect x="200" y="50" width="80" height="34" rx="4" fill="#1e293b" stroke="#0f172a"/>
  <text x="240" y="71" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">S5700-核心</text>

  <!-- 双上联 R1 (主) + R2 (备) -->
  <rect x="120" y="10" width="80" height="22" rx="3" fill="#0284c7" stroke="#0c4a6e"/>
  <text x="160" y="26" text-anchor="middle" fill="#fff" font-size="11">R1 主</text>
  <rect x="280" y="10" width="80" height="22" rx="3" fill="#0284c7" stroke="#0c4a6e"/>
  <text x="320" y="26" text-anchor="middle" fill="#fff" font-size="11">R2 备 (新增)</text>

  <!-- 上联链路：实线主 + 虚线备 -->
  <line x1="160" y1="32" x2="220" y2="50" stroke="#16a34a" stroke-width="2"/>
  <line x1="320" y1="32" x2="260" y2="50" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- 下联 4 主机 (新增一台 D) -->
  <line x1="240" y1="84" x2="240" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="60"  y1="150" x2="420" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="60"  y1="150" x2="60"  y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="180" y1="150" x2="180" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="300" y1="150" x2="300" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="420" y1="150" x2="420" y2="190" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>

  <g font-size="11" text-anchor="middle">
    <rect x="20"  y="190" width="80" height="34" rx="4" fill="#16a34a" stroke="#14532d"/>
    <text x="60"  y="211" fill="#fff">用户 A</text>
    <rect x="140" y="190" width="80" height="34" rx="4" fill="#16a34a" stroke="#14532d"/>
    <text x="180" y="211" fill="#fff">用户 B</text>
    <rect x="260" y="190" width="80" height="34" rx="4" fill="#16a34a" stroke="#14532d"/>
    <text x="300" y="211" fill="#fff">用户 C</text>
    <rect x="380" y="190" width="80" height="34" rx="4" fill="#d97706" stroke="#92400e"/>
    <text x="420" y="211" fill="#fff">用户 D（新增）</text>
  </g>

  <!-- 标签 -->
  <text x="240" y="252" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">
    V1.9 双上联冗余组网 + 新增下行用户
  </text>
  <text x="240" y="270" text-anchor="middle" fill="#94a3b8" font-size="10">
    25GE × 2上行 (主+备) · 24GE 下行 + Eth-Trunk 含 LACP
  </text>
</svg>
